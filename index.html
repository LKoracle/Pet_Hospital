<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">

<title>PawClinic - 宠物医院管理系统</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&family=Noto+Sans+SC:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'DM Sans', 'Noto Sans SC', -apple-system, sans-serif; background: #f4f6fa; min-height: 100vh; color: #1e293b; }
  button { font-family: inherit; cursor: pointer; }
  input, select, textarea { font-family: inherit; }
  .topnav { background: #fff; border-bottom: 1px solid #e9edf3; padding: 0 32px; display: flex; align-items: center; height: 56px; position: sticky; top: 0; z-index: 100; }

  .topnav-menu button.active { background: #eff6ff; color: #2563eb; font-weight: 700; }
  .page-container { padding: 24px 32px; max-width: 1280px; margin: 0 auto; }

  .bc-arrow { width: 14px; height: 14px; }
  .badge { display: inline-flex; align-items: center; padding: 2px 10px; border-radius: 999px; font-size: 11.5px; font-weight: 600; line-height: 20px; white-space: nowrap; }
  .filter-bar { display: flex; align-items: center; gap: 12px; margin-bottom: 20px; flex-wrap: wrap; }
  .search-box { display: flex; align-items: center; gap: 8px; flex: 1; min-width: 240px; padding: 8px 14px; border-radius: 10px; border: 1px solid #e2e8f0; background: #fff; }
  .search-box input { border: none; outline: none; flex: 1; font-size: 13px; color: #1e293b; background: transparent; }
  .filter-select { padding: 8px 12px; border-radius: 8px; border: 1px solid #e2e8f0; font-size: 13px; color: #334155; background: #fff; outline: none; }
  .btn-primary { display: flex; align-items: center; gap: 6px; padding: 9px 20px; border-radius: 10px; border: none; background: #2563eb; color: #fff; font-size: 13px; font-weight: 600; box-shadow: 0 1px 3px rgba(37,99,235,0.3); }
  .btn-outline { display: flex; align-items: center; gap: 6px; padding: 9px 16px; border-radius: 10px; border: 1px solid #e2e8f0; background: #fff; font-size: 13px; font-weight: 500; color: #475569; }

  .data-table { width: 100%; border-collapse: collapse; font-size: 13px; }
  .data-table thead th { padding: 13px 16px; text-align: left; font-weight: 600; color: #64748b; font-size: 12px; border-bottom: 1px solid #e9edf3; letter-spacing: 0.02em; background: #f8fafc; }
  .data-table tbody tr { border-bottom: 1px solid #f1f5f9; transition: background 0.15s; }
  .data-table tbody tr:last-child { border-bottom: none; }
  .data-table tbody tr:hover { background: #f8fafc; }
  .data-table td { padding: 14px 16px; }
  .td-name { font-weight: 600; color: #0f172a; } .td-phone { color: #475569; } .td-balance { font-weight: 600; } .td-date { color: #64748b; }
  .pet-tags { display: flex; gap: 6px; flex-wrap: wrap; }
  .pet-tag { display: inline-flex; align-items: center; gap: 4px; padding: 2px 10px; border-radius: 999px; font-size: 12px; font-weight: 500; line-height: 20px; }
  .pet-tag.dog { background: #eff6ff; color: #1e40af; border: 1px solid #93c5fd; }
  .pet-tag.cat { background: #fdf4ff; color: #86198f; border: 1px solid #f0abfc; }
  .row-actions { display: flex; gap: 6px; }
  .btn-table { padding: 5px 12px; border-radius: 6px; border: 1px solid #e2e8f0; background: #fff; font-size: 12px; font-weight: 500; }
  .btn-table.blue { color: #2563eb; } .btn-table.gray { color: #475569; }
  .table-count { margin-top: 14px; font-size: 12px; color: #94a3b8; text-align: right; }
  .empty-state { padding: 60px; text-align: center; color: #94a3b8; font-size: 14px; }
  /* Drawer */
  .drawer-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.3); z-index: 998; backdrop-filter: blur(2px); }
  .drawer { position: fixed; right: 0; top: 0; bottom: 0; background: #fff; z-index: 999; display: flex; flex-direction: column; box-shadow: -8px 0 30px rgba(0,0,0,0.12); animation: slideIn 0.25s ease-out; }
  @keyframes slideIn { from { transform: translateX(100%); } to { transform: translateX(0); } }
  .drawer-header { padding: 20px 24px; border-bottom: 1px solid #f1f5f9; }
  .drawer-header-row { display: flex; align-items: center; justify-content: space-between; }
  .drawer-header h3 { font-size: 17px; font-weight: 700; color: #0f172a; }
  .drawer-close { background: #f1f5f9; border: none; border-radius: 8px; width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; }
  .drawer-body { flex: 1; overflow: auto; padding: 24px; }
  .drawer-footer { padding: 16px 24px; border-top: 1px solid #f1f5f9; display: flex; justify-content: flex-end; gap: 10px; }
  .section-label { padding: 6px 12px; border-radius: 6px; font-size: 13px; font-weight: 600; margin-bottom: 18px; }
  .section-label.blue { background: #eff6ff; color: #1d4ed8; }

  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px 16px; }
  .form-grid .full { grid-column: 1 / -1; }
  .form-label { display: block; font-size: 12px; font-weight: 600; color: #475569; margin-bottom: 6px; }
  .form-input { width: 100%; padding: 9px 12px; border-radius: 8px; border: 1px solid #e2e8f0; font-size: 13px; color: #1e293b; outline: none; }
  .form-input:focus { border-color: #93c5fd; box-shadow: 0 0 0 3px rgba(37,99,235,0.08); }
  textarea.form-input { resize: vertical; }
  .btn-cancel { padding: 9px 20px; border-radius: 8px; border: 1px solid #e2e8f0; background: #fff; font-size: 13px; font-weight: 500; color: #475569; }
  .btn-save { padding: 9px 20px; border-radius: 8px; border: none; background: #2563eb; color: #fff; font-size: 13px; font-weight: 600; box-shadow: 0 1px 3px rgba(37,99,235,0.3); }
  .btn-save-go { padding: 9px 20px; border-radius: 8px; border: none; background: #059669; color: #fff; font-size: 13px; font-weight: 600; }
  .btn-add-pet-dashed { width: 100%; padding: 10px; border-radius: 8px; border: 1.5px dashed #c4b5fd; background: #faf5ff; color: #7c3aed; font-size: 13px; font-weight: 600; margin-bottom: 10px; }
  .btn-remove-pet { background: none; border: none; color: #dc2626; font-size: 12px; font-weight: 600; }
  .temperament-tags { display: flex; gap: 8px; flex-wrap: wrap; }
  .temp-tag { display: flex; align-items: center; gap: 4px; padding: 5px 12px; border-radius: 999px; border: 1px solid #e2e8f0; font-size: 12px; background: #f8fafc; cursor: pointer; }
  .temp-tag input { accent-color: #2563eb; }
  /* Avatar upload in create drawer */
  .pet-avatar-upload { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; }
  .pet-avatar-box { width: 72px; height: 72px; border-radius: 14px; border: 2px dashed #c4b5fd; background: #faf5ff; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; flex-shrink: 0; transition: all 0.15s; }
  .pet-avatar-box:hover { border-color: #7c3aed; background: #f5f3ff; }
  .pet-avatar-box .emoji { font-size: 24px; }
  .pet-avatar-box .txt { font-size: 9px; color: #7c3aed; font-weight: 600; margin-top: 1px; }
  .camera-btn { width: 36px; height: 36px; border-radius: 10px; border: 1px solid #e2e8f0; background: #fff; display: flex; align-items: center; justify-content: center; cursor: pointer; flex-shrink: 0; transition: all 0.15s; }
  .camera-btn:hover { background: #f8fafc; border-color: #93c5fd; }
  .avatar-hint { font-size: 11px; color: #94a3b8; line-height: 1.5; }
  /* Add Pet Drawer */
  .owner-badge { display: inline-flex; align-items: center; gap: 6px; margin-top: 10px; padding: 5px 12px; border-radius: 6px; background: #eff6ff; font-size: 12px; color: #1d4ed8; font-weight: 500; }
  .avatar-upload { width: 80px; height: 80px; border-radius: 16px; display: flex; flex-direction: column; align-items: center; justify-content: center; border: 2px dashed #c4b5fd; background: #faf5ff; cursor: pointer; }
  .avatar-upload span.icon { font-size: 28px; } .avatar-upload span.label { font-size: 10px; color: #7c3aed; margin-top: 2px; font-weight: 600; }
  .breed-chips { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 8px; }
  .breed-chip { padding: 3px 10px; border-radius: 999px; font-size: 11px; font-weight: 500; background: #f8fafc; border: 1px solid #e2e8f0; color: #475569; cursor: pointer; }
  .breed-chip:hover { background: #eff6ff; border-color: #93c5fd; color: #1d4ed8; }
  .weight-wrap { position: relative; } .weight-wrap .unit { position: absolute; right: 12px; top: 50%; transform: translateY(-50%); font-size: 12px; color: #94a3b8; font-weight: 600; }
  .temp-tag-v2 { display: flex; align-items: center; gap: 6px; padding: 7px 14px; border-radius: 999px; font-size: 12px; cursor: pointer; background: #fff; font-weight: 500; transition: all 0.15s; }
  .temp-tag-v2:hover { filter: brightness(0.96); } .temp-tag-v2 input { display: none; }
  .add-pet-footer { display: flex; justify-content: space-between; align-items: center; padding: 16px 24px; border-top: 1px solid #f1f5f9; }
  .add-pet-footer .hint { font-size: 12px; color: #94a3b8; }
  /* Detail Page */
  .btn-back { display: flex; align-items: center; gap: 6px; background: none; border: none; color: #64748b; font-size: 13px; margin-bottom: 16px; padding: 0; font-weight: 500; }
  .detail-layout { display: flex; gap: 24px; align-items: flex-start; }
  .detail-left { width: 300px; flex-shrink: 0; display: flex; flex-direction: column; gap: 16px; }
  .detail-right { flex: 1; min-width: 0; }
  .card { background: #fff; border-radius: 14px; border: 1px solid #e9edf3; }
  .profile-card { padding: 24px; } .profile-header { display: flex; align-items: center; gap: 14px; margin-bottom: 18px; }
  .profile-avatar { width: 52px; height: 52px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 22px; background: linear-gradient(135deg, #eff6ff, #dbeafe); border: 2px solid #bfdbfe; }
  .profile-name { font-size: 17px; font-weight: 700; color: #0f172a; } .profile-phone { font-size: 12px; color: #94a3b8; margin-top: 2px; }
  .profile-tags { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 14px; }
  .profile-meta { font-size: 12px; color: #94a3b8; margin-bottom: 4px; }
  .profile-remark { margin-top: 12px; padding: 8px 12px; border-radius: 8px; background: #fffbeb; font-size: 12px; color: #92400e; border: 1px solid #fde68a; line-height: 1.5; }
  .profile-btns { display: flex; gap: 8px; margin-top: 16px; }
  .profile-btns button { flex: 1; padding: 8px; border-radius: 8px; border: 1px solid #e2e8f0; background: #fff; font-size: 12px; font-weight: 500; }
  .asset-panel { padding: 20px; } .asset-title { font-size: 13px; font-weight: 700; color: #0f172a; margin-bottom: 16px; }
  .asset-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .asset-box { padding: 12px; border-radius: 10px; text-align: center; } .asset-box .val { font-size: 20px; font-weight: 800; } .asset-box .label { font-size: 11px; color: #6b7280; margin-top: 2px; }
  .card-item { display: flex; justify-content: space-between; align-items: center; padding: 8px 12px; border-radius: 8px; background: #f8fafc; margin-bottom: 6px; font-size: 12px; }
  .card-item .name { color: #334155; font-weight: 500; } .card-item .remain { color: #2563eb; font-weight: 700; }
  .coupon-row { display: flex; justify-content: space-between; margin-top: 12px; padding: 8px 12px; border-radius: 8px; background: #f8fafc; font-size: 12px; }
  .btn-recharge { width: 100%; margin-top: 14px; padding: 9px; border-radius: 8px; border: none; background: #2563eb; color: #fff; font-size: 13px; font-weight: 600; }
  .pet-tabs { display: flex; margin-bottom: 16px; background: #fff; border-radius: 12px; overflow: hidden; border: 1px solid #e9edf3; }
  .pet-tab { flex: 1; padding: 14px 16px; border: none; font-size: 14px; font-weight: 600; background: #fff; color: #475569; transition: all 0.15s; border-right: 1px solid #e9edf3; }
  .pet-tab:last-of-type { border-right: none; } .pet-tab.active { background: #2563eb; color: #fff; }
  .pet-tab-add { padding: 14px 20px; border: none; background: #f8fafc; color: #7c3aed; font-size: 13px; font-weight: 600; border-left: 1px solid #e9edf3; }
  .pet-status { padding: 20px; margin-bottom: 16px; } .pet-info-row { display: flex; gap: 20px; }
  .pet-avatar-big { width: 64px; height: 64px; border-radius: 14px; display: flex; align-items: center; justify-content: center; font-size: 34px; flex-shrink: 0; }
  .pet-avatar-big.dog { background: #eff6ff; border: 2px solid #93c5fd; } .pet-avatar-big.cat { background: #fdf4ff; border: 2px solid #f0abfc; }
  .pet-detail-name { font-size: 16px; font-weight: 700; color: #0f172a; } .pet-detail-meta { font-size: 12px; font-weight: 400; color: #94a3b8; margin-left: 8px; }
  .pet-detail-birthday { font-size: 12px; color: #64748b; margin-top: 6px; } .pet-temperaments { display: flex; gap: 6px; margin-top: 6px; }
  .health-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-top: 18px; }
  .health-card { padding: 12px 14px; border-radius: 10px; } .health-card .hl { font-size: 11px; color: #6b7280; margin-bottom: 4px; } .health-card .hv { font-size: 13px; font-weight: 700; } .health-card .hs { font-size: 11px; color: #94a3b8; margin-top: 2px; }
  .biz-tabs { display: flex; border-bottom: 1px solid #e9edf3; }
  .biz-tab { padding: 13px 20px; border: none; background: transparent; font-size: 13px; font-weight: 600; color: #94a3b8; border-bottom: 2px solid transparent; transition: all 0.15s; }
  .biz-tab.active { color: #2563eb; border-bottom-color: #2563eb; }
  .biz-content { padding: 20px; }
  .record-card { padding: 16px; border-radius: 10px; border: 1px solid #f1f5f9; background: #fafbfc; margin-bottom: 12px; }
  .record-card:last-child { margin-bottom: 0; }
  .record-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
  .record-date { font-size: 13px; font-weight: 700; color: #0f172a; }
  .record-attachment { display: flex; align-items: center; gap: 4px; font-size: 12px; color: #2563eb; cursor: pointer; }
  .record-line { font-size: 13px; color: #334155; margin-bottom: 6px; } .record-line span { font-weight: 600; color: #64748b; }
  .record-sub { font-size: 12px; color: #64748b; } .record-sub span { font-weight: 600; }
  .record-amount { display: inline-flex; align-items: center; gap: 4px; padding: 3px 10px; border-radius: 6px; background: #fef3c7; color: #92400e; font-size: 12px; font-weight: 700; }
  .photo-tags { display: flex; gap: 8px; margin-top: 10px; }
  .photo-tag { padding: 6px 12px; border-radius: 6px; background: #f1f5f9; font-size: 12px; color: #475569; }
  .billing-item { display: flex; justify-content: space-between; align-items: center; padding: 14px 16px; border-radius: 10px; border: 1px solid #f1f5f9; background: #fafbfc; margin-bottom: 8px; }
  .billing-item:last-of-type { margin-bottom: 0; }
  .billing-name { font-size: 13px; font-weight: 600; color: #0f172a; } .billing-date { font-size: 12px; color: #94a3b8; margin-top: 2px; }
  .billing-amount { font-size: 16px; font-weight: 800; }
  .billing-total { margin-top: 14px; padding: 10px 16px; border-radius: 8px; background: #f8fafc; text-align: right; font-size: 13px; }
  .billing-total span { font-weight: 800; color: #0f172a; font-size: 16px; }
  .empty-tab { text-align: center; padding: 40px; color: #94a3b8; font-size: 13px; }
  /* Purchase record */
  .purchase-item { display: flex; align-items: center; gap: 14px; padding: 14px 16px; border-radius: 10px; border: 1px solid #f1f5f9; background: #fafbfc; margin-bottom: 8px; }
  .purchase-icon { width: 40px; height: 40px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 20px; flex-shrink: 0; }
  .purchase-info { flex: 1; }
  .purchase-name { font-size: 13px; font-weight: 600; color: #0f172a; }
  .purchase-detail { font-size: 12px; color: #94a3b8; margin-top: 2px; }
  .purchase-right { text-align: right; }
  .purchase-price { font-size: 14px; font-weight: 700; color: #0f172a; }
  .purchase-qty { font-size: 11px; color: #94a3b8; margin-top: 2px; }
  /* Edit button in detail */
  .btn-edit-sm { padding: 4px 10px; border-radius: 6px; border: 1px solid #e2e8f0; background: #fff; font-size: 11px; font-weight: 600; color: #2563eb; cursor: pointer; display: inline-flex; align-items: center; gap: 4px; }
  .btn-edit-sm:hover { background: #eff6ff; }
  .icon-sm { width: 16px; height: 16px; vertical-align: middle; }
  .icon-file { width: 13px; height: 13px; vertical-align: middle; }

  /* ═══════ Booking Module CSS ═══════ */
  .fl{display:block;font-size:12px;font-weight:600;color:#475569;margin-bottom:6px;}
  .fi{width:100%;padding:9px 12px;border-radius:8px;border:1px solid #e2e8f0;font-size:13px;color:#1e293b;outline:none;}
  .fi:focus{border-color:#93c5fd;box-shadow:0 0 0 3px rgba(37,99,235,.08);}
  textarea.fi{resize:vertical;}
  .bc{padding:9px 20px;border-radius:8px;border:1px solid #e2e8f0;background:#fff;font-size:13px;font-weight:500;color:#475569;}
/* Module tabs */
.mod-tabs{display:flex;background:#fff;border-radius:12px;overflow:hidden;border:1px solid #e9edf3;margin-bottom:24px;}
.mod-tab{flex:1;padding:14px 20px;border:none;font-size:14px;font-weight:600;background:#fff;color:#64748b;transition:all .15s;border-right:1px solid #e9edf3;}
.mod-tab:last-child{border-right:none;} .mod-tab.active{background:#2563eb;color:#fff;}

/* Stats */
.stats-bar{display:flex;gap:16px;margin-bottom:20px;}
.stat-card{flex:1;background:#fff;border-radius:10px;padding:16px 20px;border:1px solid #e9edf3;display:flex;align-items:center;gap:14px;}
.stat-icon{width:42px;height:42px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;}
.stat-val{font-size:24px;font-weight:800;color:#0f172a;} .stat-lbl{font-size:12px;color:#94a3b8;margin-top:1px;}

/* Controls */
.dash-ctrl{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:10px;}
.vw-switch{display:flex;background:#fff;border-radius:8px;overflow:hidden;border:1px solid #e9edf3;}
.vw-btn{padding:7px 16px;border:none;background:#fff;font-size:12px;font-weight:600;color:#64748b;border-right:1px solid #e9edf3;}
.vw-btn:last-child{border-right:none;} .vw-btn.active{background:#2563eb;color:#fff;}
.date-nav{display:flex;align-items:center;gap:8px;}
.date-nav button{width:32px;height:32px;border-radius:8px;border:1px solid #e9edf3;background:#fff;display:flex;align-items:center;justify-content:center;}
.date-nav .dl{font-size:14px;font-weight:700;color:#0f172a;min-width:160px;text-align:center;}
.flt-sel{padding:7px 12px;border-radius:8px;border:1px solid #e9edf3;font-size:12px;color:#334155;background:#fff;outline:none;}

/* Day/Resource View */
.rv-wrap{overflow-x:auto;}
.rv-scroll{max-height:calc(100vh - 310px);overflow-y:auto;}
.rv{display:flex;background:#fff;border-radius:14px;border:1px solid #e9edf3;overflow:hidden;min-width:800px;}
.tc{width:64px;flex-shrink:0;border-right:1px solid #e9edf3;background:#f8fafc;}
.ts{height:60px;padding:4px 6px;font-size:10px;font-weight:600;color:#94a3b8;border-bottom:1px solid #f1f5f9;display:flex;align-items:flex-start;justify-content:flex-end;}
.rc{flex:1;min-width:200px;border-right:1px solid #f1f5f9;} .rc:last-child{border-right:none;}
.rh{padding:10px 14px;border-bottom:1px solid #e9edf3;background:#f8fafc;display:flex;align-items:center;gap:8px;height:44px;}
.rn{font-size:13px;font-weight:700;color:#0f172a;} .rr{font-size:10px;color:#94a3b8;font-weight:500;}
.rb{position:relative;} .sr{height:60px;border-bottom:1px solid #f8fafc;}

/* Appointment blocks */
.ab{position:absolute;left:5px;right:5px;border-radius:8px;padding:6px 10px;font-size:11px;cursor:pointer;overflow:hidden;transition:box-shadow .15s,transform .15s;z-index:5;}
.ab:hover{box-shadow:0 4px 14px rgba(0,0,0,0.13);transform:translateY(-1px);z-index:10;}

// ═══════════ LIST PAGE ═══════════
function renderList(){
  const el=document.getElementById('page-list');
  const s=document.getElementById('search-input')?.value||'';
  const lF=document.getElementById('filter-level')?.value||'全部';
  const sF=document.getElementById('filter-species')?.value||'全部';
  const f=CUSTOMERS.filter(c=>{
    const ms=!s||c.name.includes(s)||c.phone.includes(s)||c.pets.some(p=>p.name.includes(s));
    const ml=lF==='全部'||c.level===lF;
    const msp=sF==='全部'||c.pets.some(p=>p.species===sF);
    return ms&&ml&&msp;
  });
  let rows=f.map(c=>{const lc=LEVEL_COLORS[c.level];return `<tr><td class="td-name">${c.name}</td><td class="td-phone">${c.phone}</td><td>${badge(c.level,lc.bg,lc.text,lc.border)}</td><td class="td-balance" style="color:${c.balance>0?'#059669':'#94a3b8'}">¥${c.balance.toLocaleString()}</td><td><div class="pet-tags">${c.pets.map(p=>petTag(p)).join('')}</div></td><td class="td-date">${c.lastVisit}</td><td><div class="row-actions"><button class="btn-table blue" onclick="viewDetail(${c.id})">查看详情</button><button class="btn-table gray">快捷预约</button></div></td></tr>`;}).join('');
  el.innerHTML=`<div class="filter-bar"><div class="search-box">${svgSearch()}<input id="search-input" placeholder="搜索客户姓名、手机号、宠物昵称..." value="${s}" oninput="renderList()"></div><select id="filter-level" class="filter-select" onchange="renderList()"><option ${lF==='全部'?'selected':''}>全部</option><option ${lF==='钻石会员'?'selected':''}>钻石会员</option><option ${lF==='黄金会员'?'selected':''}>黄金会员</option><option ${lF==='普通会员'?'selected':''}>普通会员</option></select><select id="filter-species" class="filter-select" onchange="renderList()"><option ${sF==='全部'?'selected':''}>全部</option><option ${sF==='猫'?'selected':''}>猫</option><option ${sF==='狗'?'selected':''}>狗</option></select><div style="flex:1"></div><button class="btn-primary" onclick="openCreateDrawer()">${svgPlus()} 新建客户及宠物</button><button class="btn-outline">${svgDownload()} 导出</button></div><div class="data-table-wrap"><table class="data-table"><thead><tr><th>客户姓名</th><th>手机号</th><th>会员等级</th><th>账户余额</th><th>旗下宠物</th><th>最近到店</th><th>操作</th></tr></thead><tbody>${rows}</tbody></table>${f.length===0?'<div class="empty-state">暂无匹配的客户数据</div>':''}</div><div class="table-count">共 ${f.length} 条记录</div>`;
}

// ═══════════ DETAIL PAGE ═══════════
function renderDetail(){
  const c=state.selectedCustomer; if(!c)return;
  const pet=c.pets[state.activePetIdx]; const lc=LEVEL_COLORS[c.level]; const el=document.getElementById('page-detail');
  let petTabs=c.pets.map((p,i)=>`<button class="pet-tab ${state.activePetIdx===i?'active':''}" onclick="switchPet(${i})">${p.avatar} ${p.name}（${p.breed}）</button>`).join('');
  const vBg=pet.vaccineOverdue?'#fef2f2':'#f0fdf4',vBd=pet.vaccineOverdue?'#fecaca':'#bbf7d0',vC=pet.vaccineOverdue?'#dc2626':'#059669',vT=pet.vaccineOverdue?'⚠ 已超期':'✓ 正常';
  const aBg=pet.allergies.length>0?'#fef2f2':'#f8fafc',aBd=pet.allergies.length>0?'#fecaca':'#e2e8f0',aC=pet.allergies.length>0?'#dc2626':'#94a3b8',aT=pet.allergies.length>0?'⚠ '+pet.allergies.join('、'):'无记录';

  let biz='';
  if(state.activeTab==='medical'){
    if(!pet.medicalRecords.length) biz='<div class="empty-tab">暂无病历记录</div>';
    else biz=pet.medicalRecords.map(r=>`<div class="record-card"><div class="record-header"><div style="display:flex;align-items:center;gap:10px"><span class="record-date">${r.date}</span>${badge(r.doctor,'#eff6ff','#1d4ed8','#bfdbfe')}<span class="record-amount">¥${r.amount}</span></div>${r.attachment?`<span class="record-attachment">${svgFile()} 化验单</span>`:''}</div><div class="record-line"><span>诊断：</span>${r.diagnosis}</div><div class="record-sub"><span>处方：</span>${r.prescription}</div></div>`).join('');
  } else if(state.activeTab==='groom'){
    if(!pet.groomRecords.length) biz='<div class="empty-tab">暂无洗护记录</div>';
    else biz=pet.groomRecords.map(r=>`<div class="record-card"><div style="display:flex;align-items:center;gap:10px;margin-bottom:8px"><span class="record-date">${r.date}</span>${badge(r.groomer,'#fdf4ff','#86198f','#f0abfc')}<span class="record-amount">${r.amount>0?'¥'+r.amount:r.note||'次卡抵扣'}</span></div><div class="record-line"><span>项目：</span>${r.service}</div><div class="photo-tags">${r.hasBefore?'<div class="photo-tag">📷 洗护前</div>':''}${r.hasAfter?'<div class="photo-tag">📷 洗护后</div>':''}</div></div>`).join('');
  } else if(state.activeTab==='purchase'){
    if(!pet.purchaseRecords.length) biz='<div class="empty-tab">暂无商品购买记录</div>';
    else {
      const total=pet.purchaseRecords.reduce((s,r)=>s+r.price*r.qty,0);
      biz=pet.purchaseRecords.map(r=>{const icon=CATEGORY_ICONS[r.category]||'📦';const bg=r.category==='主粮'?'#fef3c7':r.category==='零食'?'#fce7f3':'#e0f2fe';
      return `<div class="purchase-item"><div class="purchase-icon" style="background:${bg}">${icon}</div><div class="purchase-info"><div class="purchase-name">${r.name}</div><div class="purchase-detail">${r.date} · ${r.category}</div></div><div class="purchase-right"><div class="purchase-price">¥${r.price*r.qty}</div><div class="purchase-qty">x${r.qty}</div></div></div>`;}).join('')+`<div class="billing-total">累计购买：<span>¥${total.toLocaleString()}</span></div>`;
    }
  } else {
    if(!pet.billingRecords.length) biz='<div class="empty-tab">暂无消费记录</div>';
    else { const t=pet.billingRecords.reduce((s,r)=>s+r.amount,0);
      biz=pet.billingRecords.map(r=>`<div class="billing-item"><div><div class="billing-name">${r.items}</div><div class="billing-date">${r.date}</div></div><div class="billing-amount" style="color:${r.amount>0?'#0f172a':'#94a3b8'}">${r.amount>0?'¥'+r.amount:'次卡抵扣'}</div></div>`).join('')+`<div class="billing-total">累计消费：<span>¥${t.toLocaleString()}</span></div>`;
    }
  }
  let cardsHtml='';
  if(c.cards.length>0){cardsHtml=`<div style="margin-top:14px"><div style="font-size:12px;font-weight:600;color:#64748b;margin-bottom:8px">卡项</div>${c.cards.map(card=>`<div class="card-item"><span class="name">${card.name}</span><span class="remain">剩余 ${card.remain}/${card.total}</span></div>`).join('')}</div>`;}

  el.innerHTML=`
    <button class="btn-back" onclick="backToList()">${svgBack()} 返回列表</button>
    <div class="detail-layout">
      <div class="detail-left">
        <div class="card profile-card">
          <div class="profile-header"><div class="profile-avatar">${c.gender==='女'?'👩':'👨'}</div><div><div class="profile-name">${c.name}</div><div class="profile-phone">${c.phone}</div></div></div>
          <div class="profile-tags">${badge(c.level,lc.bg,lc.text,lc.border)} ${c.tags.map(t=>badge(t,'#f0fdf4','#166534','#bbf7d0')).join(' ')}</div>
          <div class="profile-meta">来源：${c.source} | 注册：${c.registerDate}</div>
          ${c.remark?`<div class="profile-remark">${c.remark}</div>`:''}
          <div class="profile-btns"><button style="color:#2563eb" onclick="openEditCustDrawer()">编辑资料</button><button style="color:#475569">发送短信</button></div>
        </div>
        <div class="card asset-panel">
          <div class="asset-title">数字资产</div>
          <div class="asset-grid"><div class="asset-box" style="background:#f0fdf4"><div class="val" style="color:#059669">¥${c.balance.toLocaleString()}</div><div class="label">储值余额</div></div><div class="asset-box" style="background:#fef3c7"><div class="val" style="color:#d97706">${c.points}</div><div class="label">可用积分</div></div></div>
          ${cardsHtml}
          <div class="coupon-row"><span style="color:#64748b">优惠券</span><span style="color:#6d28d9;font-weight:700">${c.coupons} 张可用</span></div>
          <button class="btn-recharge">充值</button>
        </div>
      </div>
      <div class="detail-right">
        <div class="pet-tabs">${petTabs}<button class="pet-tab-add" onclick="openAddPetDrawer()">+ 添加</button></div>
        <div class="card pet-status">
          <div class="pet-info-row">
            <div class="pet-avatar-big ${pet.species==='猫'?'cat':'dog'}">${pet.avatar}</div>
            <div style="display:flex;flex-direction:column;gap:6px;flex:1">
              <div style="display:flex;align-items:center;justify-content:space-between">
                <div><span class="pet-detail-name">${pet.name}</span><span class="pet-detail-meta">${pet.breed} · ${pet.gender}${pet.neutered?'-已绝育':'-未绝育'} · ${pet.weight}kg</span></div>
                <button class="btn-edit-sm" onclick="openEditPetDrawer()">${svgEdit()} 编辑宠物</button>
              </div>
              <div class="pet-detail-birthday">📅 出生：${pet.birthday}（${pet.age}）</div>
              <div class="pet-temperaments">${pet.temperament.map(t=>{const s=TEMP_STYLES[t]||TEMP_STYLES['亲人'];return badge((t.includes('预警')?'⚠️ ':'')+t,s.bg,s.text);}).join('')}</div>

          <div class="health-grid">
            <div class="health-card" style="background:${vBg};border:1px solid ${vBd}"><div class="hl">疫苗状态</div><div class="hv" style="color:${vC}">${vT}</div><div class="hs">下次：${pet.nextVaccine}</div></div>

            <button class="biz-tab ${state.activeTab==='purchase'?'active':''}" onclick="switchTab('purchase')">商品购买</button>
            <button class="biz-tab ${state.activeTab==='billing'?'active':''}" onclick="switchTab('billing')">消费账单</button>
          </div>
          <div class="biz-content">${biz}</div>

          <div class="ttr"><span class="ttl">电话</span><span class="ttv">${a.phone}</span></div>
          ${a.note?`<div class="ttr"><span class="ttl">备注</span><span class="ttv" style="color:#dc2626">${a.note}</span></div>`:''}
          <div class="tta">
            <button class="ttb ttb-g" onclick="event.stopPropagation();doCheckin(${a.id})">签到</button>
            <button class="ttb ttb-b" onclick="event.stopPropagation()">改签</button>
            <button class="ttb ttb-r" onclick="event.stopPropagation();doCancel(${a.id})">取消</button>
          </div>
        </div>
      </div>`;
    }).join('');
    cols+=`<div class="rc"><div class="rh"><span style="font-size:15px">${s.emoji}</span><div><div class="rn">${s.name}</div><div class="rr">${s.role}</div></div></div><div class="rb">${slots}${blocks}</div></div>`;
  });
  return `<div class="rv-wrap"><div class="rv-scroll"><div class="rv"><div class="tc"><div style="height:44px;border-bottom:1px solid #e9edf3"></div>${HRS.map(h=>`<div class="ts">${h}</div>`).join('')}</div>${cols}</div></div></div>`;
}

function buildWeekView(){
  // Group appointments by day
  let headerCells=WK.map((d,i)=>{
    const isToday=i===1;
    return `<th style="${isToday?'background:#eff6ff;color:#2563eb':''}">${d}${isToday?' <span style="font-size:9px;background:#2563eb;color:#fff;padding:1px 6px;border-radius:99px;margin-left:4px">今天</span>':''}</th>`;
  }).join('');

  // Build rows per time block (morning/afternoon)
  const periods=[{label:'上午',hours:['09:00','09:30','10:00','10:30','11:00','11:30']},{label:'下午',hours:['12:00','12:30','13:00','13:30','14:00','14:30','15:00','15:30','16:00','16:30','17:00','17:30']}];

  let rows='';
  periods.forEach(p=>{
    let cells=WK.map((_,dayIdx)=>{
      const dayNum=dayIdx;
      const dayAppts=APPTS.filter(a=>a.day===dayNum&&p.hours.includes(a.time));
      if(!dayAppts.length) return `<td><div class="wv-count">无预约</div></td>`;
      return `<td>${dayAppts.map(a=>{
        const cls=a.type==='med'?'med':a.type==='vac'?'vac':'grm';
        const staff=STAFF.find(st=>st.id===a.sid);
        return `<div class="wv-appt ${cls}" onclick="openSt(${a.id})" title="${a.cust} ${a.pet} ${a.svc}">${a.time} ${a.cust} · ${staff?staff.name:''}</div>`;
      }).join('')}</td>`;
    }).join('');
    rows+=`<tr><td>${p.label}</td>${cells}</tr>`;
  });

  // Summary row
  let sumCells=WK.map((_,dayIdx)=>{
    const cnt=APPTS.filter(a=>a.day===dayIdx).length;
    const pct=Math.min(cnt/5*100,100);
    const color=pct>80?'#dc2626':pct>50?'#d97706':'#059669';
    return `<td style="vertical-align:middle"><div style="font-size:12px;font-weight:700;color:#0f172a;margin-bottom:4px">${cnt} 预约</div><div style="height:4px;border-radius:2px;background:#f1f5f9"><div style="height:100%;border-radius:2px;background:${color};width:${pct}%"></div></div><div style="font-size:10px;color:#94a3b8;margin-top:2px">饱和度 ${Math.round(pct)}%</div></td>`;
  }).join('');

  return `<div class="wv"><table><thead><tr><th>时段</th>${headerCells}</tr></thead><tbody>${rows}<tr style="background:#f8fafc"><td style="font-weight:700;color:#64748b">汇总</td>${sumCells}</tr></tbody></table></div>`;
}

  if(s===1){

    foot.innerHTML=`<button class="bc" onclick="closeBk()">取消</button><button class="btn-primary" style="${S.bkPet!==null?'':'opacity:.4;pointer-events:none'}" onclick="S.bkStep=2;renderBk()">下一步</button>`;

    foot.innerHTML=`<button class="bc" onclick="S.bkStep=1;renderBk()">上一步</button><button class="btn-primary" style="${S.bkSvc!==null&&S.bkStaff!==null?'':'opacity:.4;pointer-events:none'}" onclick="S.bkStep=3;renderBk()">下一步</button>`;

// ─── KANBAN ───
function renderKanban(){
  var el=document.getElementById('groom-content');
  var today='2025-03-11';
  var active=GROOM_TASKS.filter(function(t){return t.status!=='done';}).length;
  var done=GROOM_TASKS.filter(function(t){return t.status==='done'&&t.date===today;}).length;
  var statsHtml='<div style="display:flex;gap:16px;margin-bottom:16px">'
    +'<div style="flex:1;background:#fff;border-radius:10px;padding:14px 18px;border:1px solid #e9edf3;display:flex;align-items:center;gap:12px"><div style="width:38px;height:38px;border-radius:10px;background:#dbeafe;display:flex;align-items:center;justify-content:center;font-size:16px">🐾</div><div><div style="font-size:22px;font-weight:800;color:#0f172a">'+active+'</div><div style="font-size:12px;color:#94a3b8">进行中</div></div></div>'
    +'<div style="flex:1;background:#fff;border-radius:10px;padding:14px 18px;border:1px solid #e9edf3;display:flex;align-items:center;gap:12px"><div style="width:38px;height:38px;border-radius:10px;background:#d1fae5;display:flex;align-items:center;justify-content:center;font-size:16px">✅</div><div><div style="font-size:22px;font-weight:800;color:#0f172a">'+done+'</div><div style="font-size:12px;color:#94a3b8">今日已完成</div></div></div>'
    +'<div style="flex:1"></div>'
    +'<div style="display:flex;align-items:center;font-size:11px;color:#94a3b8;gap:14px"><span>🔵 蓝=医疗 🟢 绿=洗护 🟡 黄=疫苗</span></div>'
    +'</div>';

  var colsHtml='<div class="kanban">';
  GROOM_COLS.forEach(function(col){
    var tasks=GROOM_TASKS.filter(function(t){
      if(col.key==='done') return t.status==='done'&&t.date===today;
      return t.status===col.key;
    });
    var cardsHtml=tasks.map(function(t){
      var avCls=t.species==='cat'?'cat':'dog';
      var nextStatus=getNextStatus(t.status);
      var nextLabel=getNextLabel(t.status);
      var actionBtns='';
      if(t.status!=='done'){
        actionBtns='<div class="groom-card-actions">'
          +(nextStatus?'<button class="groom-card-btn next" onclick="moveTask('+t.id+',\''+nextStatus+'\')">→ '+nextLabel+'</button>':'')
          +'<button class="groom-card-btn detail" onclick="openGroomDetail('+t.id+')">详情</button>'
          +'</div>';
      }
      return '<div class="groom-card" draggable="true" ondragstart="dragStart(event,'+t.id+')">'
        +'<div class="groom-card-head"><div class="groom-card-avatar '+avCls+'">'+t.pet+'</div><div><div class="groom-card-name">'+t.name+(t.warn?' <span class="groom-card-warn">'+t.warn+'</span>':'')+'</div><div class="groom-card-breed">'+t.breed+' · '+t.owner+'</div></div></div>'
        +'<div class="groom-card-svc">'+t.svc+'</div>'
        +'<div class="groom-card-meta"><div class="groom-card-staff">✂️ '+t.staff+'</div><div class="groom-card-time">'+t.checkinTime+'</div></div>'
        +actionBtns
        +'</div>';
    }).join('');

    colsHtml+='<div class="kanban-col" ondragover="event.preventDefault()" ondrop="dropTask(event,\''+col.key+'\')" style="border-top:3px solid '+col.color+'">'
      +'<div class="kanban-header"><div class="kanban-title" style="color:'+col.color+'">'+col.icon+' '+col.label+'</div><span class="kanban-count">'+tasks.length+'</span></div>'
      +'<div class="kanban-body">'+cardsHtml+'</div></div>';
  });
  colsHtml+='</div>';
  el.innerHTML=statsHtml+colsHtml;
}

function getNextStatus(s){return {todo:'washing',washing:'drying',drying:'grooming',grooming:'ready',ready:'done'}[s]||null;}
function getNextLabel(s){return {todo:'开始洗浴',washing:'开始烘干',drying:'开始美容',grooming:'洗护完成',ready:'客户已接走'}[s]||'';}

function moveTask(id,newStatus){
  var t=GROOM_TASKS.find(function(x){return x.id===id;});
  if(t){
    t.status=newStatus;
    if(newStatus==='ready'){alert('📱 已向 '+t.owner+' 推送通知："您的宝贝 '+t.pet+t.name+' 已洗香香，可以来接啦~"');}
  }
  renderKanban();
}
function dragStart(e,id){e.dataTransfer.setData('text/plain',id);}
function dropTask(e,status){e.preventDefault();var id=parseInt(e.dataTransfer.getData('text/plain'));moveTask(id,status);}

function saveGroomNote(id){
  var t=GROOM_TASKS.find(function(x){return x.id===id;});if(!t)return;
  var noteEl=document.getElementById('groom-step-note');
  var noteText=noteEl?noteEl.value.trim():'';
  t.notes=noteText;
  // Add step log entry
  if(!t.stepLog) t.stepLog=[];
  var now=new Date();
  var timeStr=('0'+now.getHours()).slice(-2)+':'+('0'+now.getMinutes()).slice(-2);
  t.stepLog.push({step:t.status,time:timeStr,photo:false,note:noteText});
}

// ─── WORK LOG ───
function renderGroomLog(){
  var el=document.getElementById('groom-content');
  var currentDate=GS.logDate||'2025-03-11';
  var doneTasks=GROOM_TASKS.filter(function(t){return t.status==='done'&&t.date===currentDate;});
  var stepLabels={'washing':'🚿 洗浴','drying':'💨 烘干','grooming':'✂️ 美容','ready':'🏠 待接回'};
  var logHtml=doneTasks.map(function(t){
    var avBg=t.species==='cat'?'background:#fdf4ff;border:1px solid #f0abfc':'background:#eff6ff;border:1px solid #93c5fd';
    // Step log with photos and notes (Change 4)
    var stepLogHtml='';
    if(t.stepLog&&t.stepLog.length>0){
      stepLogHtml='<div style="margin-top:10px;padding:10px 14px;border-radius:8px;background:#f8fafc;border:1px solid #f1f5f9">'
        +'<div style="font-size:11px;font-weight:600;color:#64748b;margin-bottom:8px">流程记录</div>';
      t.stepLog.forEach(function(sl){
        stepLogHtml+='<div style="display:flex;align-items:flex-start;gap:10px;padding:6px 0;border-bottom:1px solid #f1f5f9">'
          +'<div style="font-size:11px;font-weight:600;color:#2563eb;white-space:nowrap;min-width:90px">'+(stepLabels[sl.step]||sl.step)+' '+sl.time+'</div>'
          +'<div style="flex:1;display:flex;align-items:center;gap:8px">'
          +(sl.photo?'<div style="width:36px;height:36px;border-radius:6px;background:#dbeafe;display:flex;align-items:center;justify-content:center;font-size:12px;color:#1d4ed8;font-weight:600;flex-shrink:0;border:1px solid #93c5fd">📷</div>':'')
          +'<div style="font-size:12px;color:#334155">'+(sl.note||'<span style="color:#cbd5e1">—</span>')+'</div>'
          +'</div></div>';
      });
      stepLogHtml+='</div>';
    }
    return '<div class="log-card">'
      +'<div class="log-header"><div class="log-pet"><div class="log-avatar" style="'+avBg+'">'+t.pet+'</div><div><div class="log-name">'+t.name+' <span style="font-size:12px;font-weight:400;color:#94a3b8">'+t.breed+' · '+t.owner+'</span></div><div class="log-sub">'+t.svc+' · 签到 '+t.checkinTime+'</div></div></div><span class="badge" style="background:#d1fae5;color:#065f46">已完成</span></div>'
      +'<div class="log-photos">'
      +(t.beforePhoto?'<div class="log-photo" style="background:#dbeafe;color:#1d4ed8;border:1px solid #93c5fd;font-weight:600">📷 洗前</div>':'')
      +(t.afterPhoto?'<div class="log-photo" style="background:#d1fae5;color:#065f46;border:1px solid #86efac;font-weight:600">📷 洗后</div>':'')
      +'<div class="log-photo">+ 上传</div>'
      +'</div>'
      +(t.notes?'<div class="log-note">📝 美容师备注：'+t.notes+'</div>':'')
      +stepLogHtml
      +(t.staffWash?'<div class="log-split"><div class="log-split-item"><div class="log-split-role">洗浴</div><div class="log-split-name">'+t.staffWash+'</div></div><div class="log-split-item"><div class="log-split-role">美容/修剪</div><div class="log-split-name">'+t.staffGroom+'</div></div></div>':'')
      +'</div>';
  }).join('');
  if(!doneTasks.length) logHtml='<div style="text-align:center;padding:40px;color:#94a3b8;font-size:13px">该日期暂无已完成的洗护记录</div>';

  // Date display
  var dateObj=new Date(currentDate);
  var weekDays=['周日','周一','周二','周三','周四','周五','周六'];
  var dateLabel=currentDate+' '+weekDays[dateObj.getDay()];
  var isToday=currentDate==='2025-03-11';

  el.innerHTML='<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">'
    +'<div style="display:flex;align-items:center;gap:14px">'
    +'<div style="font-size:14px;font-weight:700;color:#0f172a">工作记录 ('+doneTasks.length+')</div>'
    // Date navigation (Change 3)
    +'<div style="display:flex;align-items:center;gap:8px">'
    +'<button onclick="changeLogDate(-1)" style="width:28px;height:28px;border-radius:6px;border:1px solid #e9edf3;background:#fff;display:flex;align-items:center;justify-content:center;cursor:pointer"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg></button>'
    +'<div style="font-size:13px;font-weight:600;color:#0f172a;min-width:140px;text-align:center;display:flex;align-items:center;justify-content:center;gap:6px">'
    +'<input type="date" id="log-date-picker" value="'+currentDate+'" onchange="GS.logDate=this.value;renderGroomLog()" style="border:none;font-size:13px;font-weight:600;color:#0f172a;background:transparent;cursor:pointer;outline:none;width:auto">'
    +(isToday?'<span style="font-size:10px;background:#2563eb;color:#fff;padding:1px 8px;border-radius:99px">今天</span>':'')
    +'</div>'
    +'<button onclick="changeLogDate(1)" style="width:28px;height:28px;border-radius:6px;border:1px solid #e9edf3;background:#fff;display:flex;align-items:center;justify-content:center;cursor:pointer"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg></button>'
    +(isToday?'':'<button onclick="GS.logDate=\'2025-03-11\';renderGroomLog()" style="padding:4px 10px;border-radius:6px;border:1px solid #e2e8f0;background:#fff;font-size:11px;font-weight:600;color:#2563eb;cursor:pointer;margin-left:4px">回到今天</button>')
    +'</div>'
    +'</div>'
    +'<div style="display:flex;gap:8px"><select class="filter-select"><option>全部美容师</option><option>小陈</option><option>小张</option></select><button class="btn-outline" style="font-size:12px;padding:6px 12px"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg> 导出</button></div></div>'+logHtml;
}

function changeLogDate(delta){
  var d=new Date(GS.logDate);
  d.setDate(d.getDate()+delta);
  GS.logDate=d.toISOString().slice(0,10);
  renderGroomLog();
}

      rH+='</div>';

    } else if(vw==='emr'){

        +'<div style="margin-bottom:16px"><div style="padding:6px 12px;border-radius:6px;background:#eff6ff;color:#1d4ed8;font-size:12px;font-weight:700;margin-bottom:8px">S - 主诉与病史</div><div class="form-grid"><div class="full"><label class="form-label">主诉 *</label><textarea class="form-input" rows="2">'+sel.chief+'</textarea></div></div></div>'
        +'<div style="margin-bottom:16px"><div style="padding:6px 12px;border-radius:6px;background:#f0fdf4;color:#059669;font-size:12px;font-weight:700;margin-bottom:8px">O - 体格检查</div><div class="form-grid"><div><label class="form-label">体重(kg)*</label><input class="form-input" type="number" value="'+(sel.weight||'')+'"></div><div><label class="form-label">体温(°C)*</label><input class="form-input" type="number" value="'+(sel.temp||'')+'"></div><div><label class="form-label">心率*</label><input class="form-input" type="number" value="'+(sel.hr||'')+'"></div><div><label class="form-label">呼吸*</label><input class="form-input" type="number" value="'+(sel.rr||'')+'"></div></div><div style="margin-top:8px"><label class="form-label">检体</label><textarea class="form-input" rows="2" placeholder="检体记录..."></textarea></div></div>'
        +'<div style="margin-bottom:16px"><div style="padding:6px 12px;border-radius:6px;background:#fef3c7;color:#92400e;font-size:12px;font-weight:700;margin-bottom:8px">A - 诊断</div><div class="form-grid"><div class="full"><label class="form-label">诊断（拼音首字母检索）</label><input class="form-input" list="diag-list" placeholder="输入诊断..."><datalist id="diag-list">'+MED_DIAGNOSES.map(function(d){return '<option>'+d+'</option>';}).join('')+'</datalist></div></div></div>'

    }

function openMedRegister(){ document.getElementById('st-title').textContent='门诊挂号'; document.getElementById('st-body').innerHTML='<div class="form-grid"><div class="full"><label class="form-label">搜索客户/宠物 *</label><input class="form-input" placeholder="手机号、姓名或宠物昵称..."></div><div><label class="form-label">科室</label><select class="form-input"><option>全科</option><option>皮肤科</option><option>内科</option><option>外科</option></select></div><div><label class="form-label">医生</label><select class="form-input"><option>李医生</option><option>王医生</option></select></div><div class="full"><label class="form-label">主诉</label><textarea class="form-input" rows="3" placeholder="主人描述..."></textarea></div></div><div style="display:flex;gap:8px;margin-top:24px"><button class="btn-cancel" onclick="closeSt()" style="flex:1">取消</button><button class="btn-save" onclick="closeSt()" style="flex:1">确认挂号</button></div>'; document.getElementById('st-ov').style.display='block';document.getElementById('st-dw').style.display='flex'; }

function renderMedLab(){ var el=document.getElementById('med-content');

  function ls(s){return s==='pending'?'<span class="badge" style="background:#fef3c7;color:#92400e">待检验</span>':'<span class="badge" style="background:#d1fae5;color:#065f46">已出报告</span>';}

  el.innerHTML='<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;flex-wrap:wrap;gap:10px"><div style="display:flex;align-items:center;gap:10px"><div style="font-size:14px;font-weight:700">🔬 检验与影像</div><input type="date" value="'+(isAll?'':dt)+'" onchange="MED.labDate=this.value||\'all\';renderMedLab()" style="padding:6px 10px;border-radius:8px;border:1px solid #e2e8f0;font-size:12px"><button style="padding:5px 12px;border-radius:6px;border:1px solid '+(isAll?'#2563eb':'#e2e8f0')+';background:'+(isAll?'#eff6ff':'#fff')+';color:'+(isAll?'#2563eb':'#64748b')+';font-size:12px;font-weight:600;cursor:pointer" onclick="MED.labDate=\'all\';renderMedLab()">全部</button></div><div style="display:flex;gap:8px"><div class="search-box" style="min-width:180px;padding:6px 10px"><svg class="icon-sm" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg><input placeholder="搜索宠物/主人..." value="'+(sK||'')+'" oninput="MED.labSearch=this.value;renderMedLab()" style="font-size:12px"></div><button class="btn-primary" style="font-size:12px" onclick="openMedLabOrder()">+ 开检验单</button></div></div><div class="data-table-wrap"><table class="data-table"><thead><tr><th>单号</th><th>日期</th><th>宠物</th><th>主人</th><th>项目</th><th style="text-align:center">状态</th><th>医生</th><th>操作</th></tr></thead><tbody>'+rows+'</tbody></table>'+(fl.length===0?'<div class="empty-state">暂无</div>':'')+'</div><div class="table-count">共 '+fl.length+' 条</div>';

function doRxDispense(id){
  var r=MED_RX.find(function(x){return x.id===id;});if(!r)return;
  var hasInject=r.drugs.some(function(d){return d.type==='inject';});
  if(hasInject&&r.status==='pending'){r.status='injecting';}else{r.status='dispensed';}
  var now=new Date();r.dispenseTime=now.toISOString().slice(0,10)+' '+('0'+now.getHours()).slice(-2)+':'+('0'+now.getMinutes()).slice(-2);
  r.dispenseBy='药房-小刘';
  if(MED.tab==='rx') renderMedRx(); else renderMedWorkbench();
}

function doRxInjectDone(id){
  var r=MED_RX.find(function(x){return x.id===id;});if(!r)return;
  r.status='inject_done';
  if(!r.dispenseTime){var now=new Date();r.dispenseTime=now.toISOString().slice(0,10)+' '+('0'+now.getHours()).slice(-2)+':'+('0'+now.getMinutes()).slice(-2);r.dispenseBy='药房-小刘';}
  if(MED.tab==='rx') renderMedRx(); else renderMedWorkbench();
}

function renderMedHistory(){ var el=document.getElementById('med-content');
  var sK=MED.histSearch||'';var sD=MED.histDate||'';
  var fl=MED_HISTORY.filter(function(h){return (!sK||h.pet.includes(sK)||h.owner.includes(sK))&&(!sD||h.date===sD);});
  var rows=fl.map(function(h){
    var hasLab=h.labs&&h.labs.length>0;var hasRx=h.rxIds&&h.rxIds.length>0;var hasWard=!!h.ward;
    var tags=(hasLab?'<span style="font-size:9px;padding:1px 6px;border-radius:3px;background:#fdf4ff;color:#86198f;margin-right:3px">检验'+h.labs.length+'</span>':'')+(hasRx?'<span style="font-size:9px;padding:1px 6px;border-radius:3px;background:#eff6ff;color:#2563eb;margin-right:3px">处方'+h.rxIds.length+'</span>':'')+(hasWard?'<span style="font-size:9px;padding:1px 6px;border-radius:3px;background:#fef3c7;color:#92400e">住院</span>':'');
    return '<tr><td style="font-weight:600;color:#2563eb;font-size:12px">'+h.id+'</td><td style="color:#64748b">'+h.date+'</td><td style="font-weight:500">'+h.pet+' <span style="font-size:11px;color:#94a3b8">'+h.breed+'</span></td><td style="font-size:12px;color:#64748b">'+h.owner+'</td><td style="font-weight:600">'+h.diagnosis+'</td><td>'+tags+'</td><td style="color:#64748b;font-size:12px">'+h.doctor+'</td><td style="text-align:right;font-weight:700">¥'+h.amount+'</td><td><button class="btn-table blue" onclick="openMedHistDetail(\''+h.id+'\')">详情</button></td></tr>';
  }).join('');
  el.innerHTML='<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;flex-wrap:wrap;gap:10px"><div style="font-size:14px;font-weight:700">📂 历史诊疗记录</div><div style="display:flex;gap:8px;align-items:center"><input type="date" value="'+sD+'" onchange="MED.histDate=this.value;renderMedHistory()" style="padding:6px 10px;border-radius:8px;border:1px solid #e2e8f0;font-size:12px"><button style="padding:5px 12px;border-radius:6px;border:1px solid '+(!sD?'#2563eb':'#e2e8f0')+';background:'+(!sD?'#eff6ff':'#fff')+';color:'+(!sD?'#2563eb':'#64748b')+';font-size:12px;font-weight:600;cursor:pointer" onclick="MED.histDate=\'\';renderMedHistory()">全部</button><div class="search-box" style="min-width:200px;padding:6px 10px"><svg class="icon-sm" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg><input placeholder="搜索宠物/主人..." value="'+(sK||'')+'" oninput="MED.histSearch=this.value;renderMedHistory()" style="font-size:12px"></div></div></div>'
    +'<div class="data-table-wrap"><table class="data-table"><thead><tr><th>就诊号</th><th>日期</th><th>宠物</th><th>主人</th><th>诊断</th><th>关联记录</th><th>医生</th><th style="text-align:right">金额</th><th>操作</th></tr></thead><tbody>'+rows+'</tbody></table>'+(fl.length===0?'<div class="empty-state">暂无</div>':'')+'</div><div class="table-count">共 '+fl.length+' 条</div>';
}

  html+='<div style="margin-bottom:10px"><div style="padding:5px 10px;border-radius:6px;background:#f0fdf4;color:#059669;font-size:11px;font-weight:700;margin-bottom:6px">O - 检查</div><div style="font-size:12px;color:#334155;padding:6px 10px;border-radius:6px;background:#f8fafc;border:1px solid #f1f5f9">'+h.soap.o+'</div></div>';
  html+='<div style="margin-bottom:10px"><div style="padding:5px 10px;border-radius:6px;background:#fef3c7;color:#92400e;font-size:11px;font-weight:700;margin-bottom:6px">A - 诊断</div><div style="font-size:12px;color:#334155;padding:6px 10px;border-radius:6px;background:#f8fafc;border:1px solid #f1f5f9">'+h.soap.a+'</div></div>';
  html+='<div style="margin-bottom:14px"><div style="padding:5px 10px;border-radius:6px;background:#fdf4ff;color:#86198f;font-size:11px;font-weight:700;margin-bottom:6px">P - 治疗计划</div><div style="font-size:12px;color:#334155;padding:6px 10px;border-radius:6px;background:#f8fafc;border:1px solid #f1f5f9;white-space:pre-line">'+h.soap.p+'</div></div>';

  // Associated labs
  if(h.labs&&h.labs.length){
    html+='<div style="margin-bottom:14px"><div style="font-size:12px;font-weight:700;color:#86198f;margin-bottom:6px">🔬 关联检验 ('+h.labs.length+')</div>';
    h.labs.forEach(function(lid){var l=MED_LABS.find(function(x){return x.id===lid;});if(l){
      var rTxt=l.status==='reported'?(l.results.finding||Object.keys(l.results).map(function(k){return k.toUpperCase()+':'+l.results[k];}).join(' · ')):'待检验';

    html+='</div>';
  }
  // Associated prescriptions
  if(h.rxIds&&h.rxIds.length){
    html+='<div style="margin-bottom:14px"><div style="font-size:12px;font-weight:700;color:#2563eb;margin-bottom:6px">💊 关联处方 ('+h.rxIds.length+')</div>';
    h.rxIds.forEach(function(rid){var r=MED_RX.find(function(x){return x.id===rid;});if(r){
      var ds=r.drugs.map(function(d){return d.name+' '+d.total;}).join('、');
      html+='<div style="padding:8px 10px;border-radius:6px;background:#eff6ff;border:1px solid #bfdbfe;margin-bottom:4px;font-size:11px"><span style="font-weight:600;color:#1d4ed8">'+r.id+'</span> — <span style="color:#334155">'+ds+'</span></div>';}});
    html+='</div>';
  }
  // Associated ward
  if(h.ward){
    html+='<div style="margin-bottom:14px"><div style="font-size:12px;font-weight:700;color:#d97706;margin-bottom:6px">🏥 住院记录</div><div style="padding:8px 10px;border-radius:6px;background:#fefce8;border:1px solid #fde68a;font-size:11px;color:#334155">笼位 '+h.ward.cage+' · '+h.ward.days+'天 · ¥'+h.ward.fee+'/天 · 合计 ¥'+(h.ward.days*h.ward.fee)+'</div></div>';
  }
  html+='<div style="display:flex;gap:8px;margin-top:16px"><button class="btn-cancel" onclick="closeSt()" style="flex:1">关闭</button><button class="btn-outline" style="flex:1;justify-content:center">打印病历</button></div>';
  document.getElementById('st-body').innerHTML=html;
  document.getElementById('st-ov').style.display='block';document.getElementById('st-dw').style.display='flex';
}

  var all=POS_COMPLETED.filter(function(o){return (!sD||o.date===sD)&&(!sK||o.customer.includes(sK)||(o.pet&&o.pet.includes(sK))||(o.phone&&o.phone.includes(sK)));});
  var totalAmt=all.reduce(function(s,o){return s+o.total;},0);
  var rows=all.map(function(o){
    return '<tr><td style="font-weight:600;color:#2563eb;font-size:12px">'+o.id+'</td><td style="color:#64748b">'+o.date+'</td><td style="color:#64748b;font-size:12px">'+o.time+'</td><td style="font-weight:500">'+o.customer+'</td><td style="font-size:12px;color:#64748b">'+(o.pet||'—')+'</td><td style="font-size:12px;color:#334155;max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+(typeof o.items==='string'?o.items:o.items.map(function(i){return i.name;}).join('、'))+'</td><td style="text-align:right;font-weight:700">¥'+o.total+'</td><td style="font-size:12px;color:#64748b">'+o.payment+'</td><td style="font-size:12px;color:#64748b">'+o.cashier+'</td><td><button class="btn-table blue" onclick="openPosBizDetail(\''+o.id+'\')">明细</button></td></tr>';
  }).join('');
  el.innerHTML='<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;flex-wrap:wrap;gap:10px"><div style="display:flex;align-items:center;gap:10px"><div style="font-size:14px;font-weight:700">📊 营业查询</div><input type="date" value="'+sD+'" onchange="POS.bizDate=this.value;renderPosBiz()" style="padding:6px 10px;border-radius:8px;border:1px solid #e2e8f0;font-size:12px"><button style="padding:5px 12px;border-radius:6px;border:1px solid '+(!sD?'#2563eb':'#e2e8f0')+';background:'+(!sD?'#eff6ff':'#fff')+';color:'+(!sD?'#2563eb':'#64748b')+';font-size:12px;font-weight:600;cursor:pointer" onclick="POS.bizDate=\'\';renderPosBiz()">全部日期</button></div><div style="display:flex;gap:8px;align-items:center"><div class="search-box" style="min-width:220px;padding:6px 10px"><svg class="icon-sm" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg><input placeholder="搜索客户、宠物、手机号..." value="'+(sK||'')+'" oninput="POS.bizSearch=this.value;renderPosBiz()" style="font-size:12px"></div><button class="btn-outline" style="font-size:12px">导出</button></div></div>'
    +'<div style="display:flex;gap:16px;margin-bottom:14px"><div style="background:#fff;border-radius:10px;padding:12px 18px;border:1px solid #e9edf3;display:flex;align-items:center;gap:10px"><div style="font-size:12px;color:#94a3b8">筛选结果</div><div style="font-size:18px;font-weight:800">'+all.length+'<span style="font-size:12px;color:#94a3b8;font-weight:400"> 笔</span></div></div><div style="background:#fff;border-radius:10px;padding:12px 18px;border:1px solid #e9edf3;display:flex;align-items:center;gap:10px"><div style="font-size:12px;color:#94a3b8">合计金额</div><div style="font-size:18px;font-weight:800;color:#059669">¥'+totalAmt.toLocaleString()+'</div></div></div>'
    +'<div class="data-table-wrap"><table class="data-table"><thead><tr><th>订单号</th><th>日期</th><th>时间</th><th>客户</th><th>宠物</th><th>项目</th><th style="text-align:right">金额</th><th>支付</th><th>收银</th><th>操作</th></tr></thead><tbody>'+rows+'</tbody></table>'+(all.length===0?'<div class="empty-state">暂无匹配订单</div>':'')+'</div>';
}

function openPosBizDetail(id){
  var o=POS_COMPLETED.find(function(x){return x.id===id;});if(!o)return;
  document.getElementById('st-title').textContent='订单明细 - '+o.id;
  var itemsArr=typeof o.items==='string'?[{name:o.items,qty:1,price:o.total,cat:'retail'}]:o.items;
  var iH=itemsArr.map(function(it){var ic=it.cat==='medical'?'🏥':it.cat==='groom'?'✂️':'🛒';return '<div style="display:flex;justify-content:space-between;padding:8px 12px;border-radius:6px;background:#f8fafc;margin-bottom:4px;border:1px solid #f1f5f9"><span style="font-size:12px">'+ic+' '+it.name+(it.qty>1?' x'+it.qty:'')+'</span><span style="font-size:12px;font-weight:700">¥'+(it.price*it.qty)+'</span></div>';}).join('');

  document.getElementById('st-ov').style.display='block';document.getElementById('st-dw').style.display='flex';
}

function renderPosShift(){ var el=document.getElementById('pos-content');
  var sub=POS.shiftSub||'shifts';
  var stH='<div style="display:flex;gap:4px;margin-bottom:16px"><button style="padding:7px 18px;border-radius:8px;border:1px solid '+(sub==='shifts'?'#2563eb':'#e9edf3')+';background:'+(sub==='shifts'?'#eff6ff':'#fff')+';color:'+(sub==='shifts'?'#2563eb':'#64748b')+';font-size:13px;font-weight:600;cursor:pointer" onclick="POS.shiftSub=\'shifts\';renderPosShift()">交接班</button><button style="padding:7px 18px;border-radius:8px;border:1px solid '+(sub==='daily'?'#2563eb':'#e9edf3')+';background:'+(sub==='daily'?'#eff6ff':'#fff')+';color:'+(sub==='daily'?'#2563eb':'#64748b')+';font-size:13px;font-weight:600;cursor:pointer" onclick="POS.shiftSub=\'daily\';renderPosShift()">日结</button></div>';
  if(sub==='shifts'){
    function shSt(s){return s==='active'?'<span class="badge" style="background:#dbeafe;color:#1d4ed8">当班</span>':'<span class="badge" style="background:#f1f5f9;color:#475569">已交接</span>';}
    var rows=POS_SHIFTS.map(function(s){var t=s.cashIn+s.wechat+s.alipay+s.memberPay+s.cardDeduct;return '<tr><td style="font-weight:600;color:#2563eb;font-size:12px">'+s.id+'</td><td style="color:#64748b">'+s.date+'</td><td style="font-weight:500">'+s.cashier+'</td><td>'+s.shift+'</td><td style="font-size:12px;color:#64748b">'+s.start+(s.end?' - '+s.end:'')+'</td><td style="text-align:center;font-weight:600">'+s.totalOrders+'</td><td style="text-align:right;font-weight:700">¥'+t.toLocaleString()+'</td><td style="text-align:center">'+shSt(s.status)+'</td><td><div class="row-actions">'+(s.status==='active'?'<button class="btn-table blue" onclick="openPosShiftEnd(\''+s.id+'\')">交接</button>':'<button class="btn-table gray" onclick="openPosShiftDetail(\''+s.id+'\')">查看</button>')+'</div></td></tr>';}).join('');
    el.innerHTML=stH+'<div class="data-table-wrap"><table class="data-table"><thead><tr><th>班次</th><th>日期</th><th>收银员</th><th>班</th><th>时段</th><th style="text-align:center">单数</th><th style="text-align:right">合计</th><th style="text-align:center">状态</th><th>操作</th></tr></thead><tbody>'+rows+'</tbody></table></div>';
  } else {
    var dR=POS_DAILY.map(function(d){var mp=d.medical?Math.round(d.medical/d.totalRevenue*100):0,gp=d.groom?Math.round(d.groom/d.totalRevenue*100):0,rp=d.retail?Math.round(d.retail/d.totalRevenue*100):0;return '<tr><td style="font-weight:600">'+d.date+'</td><td style="text-align:right;font-weight:800;font-size:14px">¥'+d.totalRevenue.toLocaleString()+'</td><td style="text-align:right;color:#059669;font-weight:600">¥'+d.realIncome.toLocaleString()+'</td><td style="text-align:right;color:#2563eb">¥'+d.memberConsume.toLocaleString()+'</td><td style="text-align:right;color:#7c3aed">¥'+d.recharge.toLocaleString()+'</td><td><div style="display:flex;gap:2px;height:14px;border-radius:3px;overflow:hidden"><div style="width:'+mp+'%;background:#3b82f6"></div><div style="width:'+gp+'%;background:#10b981"></div><div style="width:'+rp+'%;background:#f59e0b"></div></div><div style="font-size:9px;color:#94a3b8;margin-top:1px">医'+mp+'% 洗'+gp+'% 零'+rp+'%</div></td><td style="text-align:center">'+d.orders+'</td><td><button class="btn-table blue" onclick="openPosDailyDetail(\''+d.date+'\')">详情</button></td></tr>';}).join('');
    el.innerHTML=stH+'<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px"><div style="font-size:14px;font-weight:700">📊 日结</div><button class="btn-primary" style="font-size:12px;background:#334155">生成今日日报</button></div><div class="data-table-wrap"><table class="data-table"><thead><tr><th>日期</th><th style="text-align:right">营业额</th><th style="text-align:right">实收</th><th style="text-align:right">储值消耗</th><th style="text-align:right">充值</th><th>占比</th><th style="text-align:center">单数</th><th>操作</th></tr></thead><tbody>'+dR+'</tbody></table></div>';
  }
}

function renderPosCommission(){ var el=document.getElementById('pos-content');
  var sub=POS.commSub||'data';
  var stH='<div style="display:flex;gap:4px;margin-bottom:16px"><button style="padding:7px 18px;border-radius:8px;border:1px solid '+(sub==='data'?'#2563eb':'#e9edf3')+';background:'+(sub==='data'?'#eff6ff':'#fff')+';color:'+(sub==='data'?'#2563eb':'#64748b')+';font-size:13px;font-weight:600;cursor:pointer" onclick="POS.commSub=\'data\';renderPosCommission()">业绩明细</button><button style="padding:7px 18px;border-radius:8px;border:1px solid '+(sub==='rules'?'#2563eb':'#e9edf3')+';background:'+(sub==='rules'?'#eff6ff':'#fff')+';color:'+(sub==='rules'?'#2563eb':'#64748b')+';font-size:13px;font-weight:600;cursor:pointer" onclick="POS.commSub=\'rules\';renderPosCommission()">规则配置</button></div>';

  if(sub==='data'){
    var cm=POS.commMonth||'2025-03';
    var data=POS_COMMISSION_DATA[cm]||[];
    var totalC=data.reduce(function(s,c){return s+c.commission;},0);
    var months=Object.keys(POS_COMMISSION_DATA).sort().reverse();
    var monthSel='<select style="padding:6px 12px;border-radius:8px;border:1px solid #e2e8f0;font-size:12px;font-weight:600;color:#0f172a" onchange="POS.commMonth=this.value;renderPosCommission()">'+months.map(function(m){return '<option value="'+m+'"'+(m===cm?' selected':'')+'>'+m+'</option>';}).join('')+'</select>';
    var rows=data.map(function(c){return '<tr><td style="font-weight:600">'+c.staff+'</td><td style="color:#64748b">'+c.role+'</td><td style="text-align:center;font-weight:600">'+c.orders+'</td><td style="text-align:right;font-weight:600">¥'+c.revenue.toLocaleString()+'</td><td style="text-align:right;font-weight:800;color:#059669;font-size:14px">¥'+c.commission.toLocaleString()+'</td><td><button class="btn-table blue">明细</button></td></tr>';}).join('');
    el.innerHTML=stH
      +'<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px"><div style="display:flex;align-items:center;gap:10px"><div style="font-size:14px;font-weight:700">📈 业绩明细</div>'+monthSel+'</div><div style="display:flex;gap:12px"><div style="background:#fff;border-radius:8px;padding:8px 16px;border:1px solid #e9edf3"><span style="font-size:11px;color:#94a3b8">本月总提成</span> <span style="font-size:16px;font-weight:800;color:#059669;margin-left:6px">¥'+totalC.toLocaleString()+'</span></div><button class="btn-outline" style="font-size:12px">导出</button></div></div>'
      +'<div class="data-table-wrap"><table class="data-table"><thead><tr><th>员工</th><th>角色</th><th style="text-align:center">接单</th><th style="text-align:right">营收</th><th style="text-align:right">提成</th><th>操作</th></tr></thead><tbody>'+rows+'</tbody></table></div>';
  } else {
    var rulesets=POS_COMMISSION_RULES.map(function(rs){
      var rRows=rs.rules.map(function(r,i){return '<tr><td style="font-weight:500">'+r.role+'</td><td style="font-weight:600">'+r.item+'</td><td style="text-align:center;font-weight:800;color:#2563eb;font-size:14px">'+r.rate+'%</td><td><button class="btn-table blue" onclick="openPosRuleEdit('+rs.id+','+i+')">编辑</button></td></tr>';}).join('');
      return '<div style="background:#fff;border-radius:14px;border:1px solid #e9edf3;overflow:hidden;margin-bottom:16px"><div style="padding:14px 18px;border-bottom:1px solid #e9edf3;display:flex;justify-content:space-between;align-items:center"><div><div style="font-size:14px;font-weight:700">'+rs.label+'</div><div style="font-size:11px;color:#94a3b8;margin-top:2px">📅 '+rs.period+'</div></div><div style="display:flex;gap:6px"><button class="btn-table blue" onclick="openPosRuleAdd('+rs.id+')">+ 新增规则</button><button class="btn-table gray" onclick="openPosRuleSetEdit('+rs.id+')">编辑时段</button></div></div><table class="data-table"><thead><tr><th>角色</th><th>项目</th><th style="text-align:center">提成比例</th><th>操作</th></tr></thead><tbody>'+rRows+'</tbody></table></div>';
    }).join('');
    el.innerHTML=stH
      +'<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px"><div style="font-size:14px;font-weight:700">⚙️ 提成规则配置</div><button class="btn-primary" style="font-size:12px" onclick="openPosNewRuleSet()">+ 新增规则时段</button></div>'
      +rulesets;
  }
}
