<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PawClinic - 预约与排班管理</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&family=Noto+Sans+SC:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'DM Sans','Noto Sans SC',-apple-system,sans-serif;background:#f4f6fa;min-height:100vh;color:#1e293b;}
button{font-family:inherit;cursor:pointer;} input,select,textarea{font-family:inherit;}

/* Nav */
.topnav{background:#fff;border-bottom:1px solid #e9edf3;padding:0 32px;display:flex;align-items:center;height:56px;position:sticky;top:0;z-index:100;}
.topnav-logo{font-size:16px;font-weight:800;color:#0f172a;letter-spacing:-0.02em;} .topnav-logo span{color:#2563eb;}
.topnav-menu{display:flex;gap:4px;margin-left:40px;}
.topnav-menu button{padding:8px 16px;border-radius:8px;border:none;background:transparent;color:#64748b;font-size:13px;font-weight:500;}
.topnav-menu button.active{background:#eff6ff;color:#2563eb;font-weight:700;}
.page-container{padding:24px 32px;max-width:1440px;margin:0 auto;}
.breadcrumb{display:flex;align-items:center;gap:6px;font-size:12px;color:#94a3b8;margin-bottom:18px;} .breadcrumb .act{color:#2563eb;font-weight:600;}

/* Module tabs */
.mod-tabs{display:flex;background:#fff;border-radius:12px;overflow:hidden;border:1px solid #e9edf3;margin-bottom:24px;}
.mod-tab{flex:1;padding:14px 20px;border:none;font-size:14px;font-weight:600;background:#fff;color:#64748b;transition:all .15s;border-right:1px solid #e9edf3;}
.mod-tab:last-child{border-right:none;} .mod-tab.active{background:#2563eb;color:#fff;}

/* Stats */
.stats-bar{display:flex;gap:16px;margin-bottom:20px;}
.stat-card{flex:1;background:#fff;border-radius:10px;padding:16px 20px;border:1px solid #e9edf3;display:flex;align-items:center;gap:14px;}
.stat-icon{width:42px;height:42px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;}
.stat-val{font-size:24px;font-weight:800;color:#0f172a;} .stat-lbl{font-size:12px;color:#94a3b8;margin-top:1px;}

/* Controls */
.dash-ctrl{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:10px;}
.vw-switch{display:flex;background:#fff;border-radius:8px;overflow:hidden;border:1px solid #e9edf3;}
.vw-btn{padding:7px 16px;border:none;background:#fff;font-size:12px;font-weight:600;color:#64748b;border-right:1px solid #e9edf3;}
.vw-btn:last-child{border-right:none;} .vw-btn.active{background:#2563eb;color:#fff;}
.date-nav{display:flex;align-items:center;gap:8px;}
.date-nav button{width:32px;height:32px;border-radius:8px;border:1px solid #e9edf3;background:#fff;display:flex;align-items:center;justify-content:center;}
.date-nav .dl{font-size:14px;font-weight:700;color:#0f172a;min-width:160px;text-align:center;}
.btn-primary{display:inline-flex;align-items:center;gap:6px;padding:9px 20px;border-radius:10px;border:none;background:#2563eb;color:#fff;font-size:13px;font-weight:600;box-shadow:0 1px 3px rgba(37,99,235,0.3);}
.flt-sel{padding:7px 12px;border-radius:8px;border:1px solid #e9edf3;font-size:12px;color:#334155;background:#fff;outline:none;}

/* Day/Resource View */
.rv-wrap{overflow-x:auto;}
.rv-scroll{max-height:calc(100vh - 310px);overflow-y:auto;}
.rv{display:flex;background:#fff;border-radius:14px;border:1px solid #e9edf3;overflow:hidden;min-width:800px;}
.tc{width:64px;flex-shrink:0;border-right:1px solid #e9edf3;background:#f8fafc;}
.ts{height:60px;padding:4px 6px;font-size:10px;font-weight:600;color:#94a3b8;border-bottom:1px solid #f1f5f9;display:flex;align-items:flex-start;justify-content:flex-end;}
.rc{flex:1;min-width:200px;border-right:1px solid #f1f5f9;} .rc:last-child{border-right:none;}
.rh{padding:10px 14px;border-bottom:1px solid #e9edf3;background:#f8fafc;display:flex;align-items:center;gap:8px;height:44px;}
.rn{font-size:13px;font-weight:700;color:#0f172a;} .rr{font-size:10px;color:#94a3b8;font-weight:500;}
.rb{position:relative;} .sr{height:60px;border-bottom:1px solid #f8fafc;}

/* Appointment blocks */
.ab{position:absolute;left:5px;right:5px;border-radius:8px;padding:6px 10px;font-size:11px;cursor:pointer;overflow:hidden;transition:box-shadow .15s,transform .15s;z-index:5;}
.ab:hover{box-shadow:0 4px 14px rgba(0,0,0,0.13);transform:translateY(-1px);z-index:10;}
.ab.med{background:linear-gradient(135deg,#dbeafe,#bfdbfe);border-left:3px solid #2563eb;color:#1e40af;}
.ab.grm{background:linear-gradient(135deg,#d1fae5,#a7f3d0);border-left:3px solid #059669;color:#065f46;}
.ab.vac{background:linear-gradient(135deg,#fef3c7,#fde68a);border-left:3px solid #d97706;color:#92400e;}
.ab-n{font-weight:700;font-size:12px;margin-bottom:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.ab-p{font-size:10px;opacity:.8;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.ab-s{position:absolute;top:5px;right:7px;width:16px;height:16px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:8px;line-height:1;}
.sp{border:2px solid #cbd5e1;background:#fff;} .sc{background:#059669;color:#fff;} .ss{background:#2563eb;color:#fff;animation:pls 1.5s infinite;} .sx{background:#cbd5e1;color:#fff;}
@keyframes pls{0%,100%{opacity:1}50%{opacity:.5}}

/* Tooltip */
.tt{display:none;position:absolute;top:100%;left:0;width:250px;background:#fff;border-radius:10px;box-shadow:0 8px 24px rgba(0,0,0,0.15);padding:14px;z-index:100;font-size:12px;border:1px solid #e9edf3;}
.ab:hover .tt{display:block;}
.ttr{display:flex;justify-content:space-between;margin-bottom:5px;} .ttl{color:#94a3b8;font-weight:500;} .ttv{color:#0f172a;font-weight:600;text-align:right;max-width:140px;}
.tta{display:flex;gap:6px;margin-top:10px;padding-top:10px;border-top:1px solid #f1f5f9;}
.ttb{flex:1;padding:6px;border-radius:6px;border:none;font-size:11px;font-weight:600;text-align:center;}
.ttb-g{background:#d1fae5;color:#059669;} .ttb-r{background:#fee2e2;color:#dc2626;} .ttb-b{background:#dbeafe;color:#2563eb;}

/* Week View */
.wv{background:#fff;border-radius:14px;border:1px solid #e9edf3;overflow:auto;}
.wv table{width:100%;border-collapse:collapse;font-size:12px;min-width:900px;}
.wv th{padding:10px 8px;font-weight:600;color:#64748b;font-size:11px;border-bottom:1px solid #e9edf3;background:#f8fafc;text-align:center;}
.wv th:first-child{text-align:left;padding-left:14px;width:80px;}
.wv td{padding:4px;border-bottom:1px solid #f8fafc;vertical-align:top;height:60px;}
.wv td:first-child{padding-left:14px;font-weight:600;color:#64748b;font-size:11px;vertical-align:middle;width:80px;background:#fafbfc;border-right:1px solid #f1f5f9;}
.wv-appt{padding:4px 8px;border-radius:6px;font-size:10px;margin-bottom:3px;cursor:pointer;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;}
.wv-appt.med{background:#dbeafe;color:#1e40af;} .wv-appt.grm{background:#d1fae5;color:#065f46;} .wv-appt.vac{background:#fef3c7;color:#92400e;}
.wv-count{font-size:10px;color:#94a3b8;padding:2px 0;}

/* Schedule */
.sch-grid{background:#fff;border-radius:14px;border:1px solid #e9edf3;overflow:auto;}
.sch table{width:100%;border-collapse:collapse;font-size:13px;min-width:850px;}
.sch th{padding:12px 10px;text-align:center;font-weight:600;color:#64748b;font-size:12px;border-bottom:1px solid #e9edf3;background:#f8fafc;}
.sch th:first-child{text-align:left;padding-left:16px;width:170px;}
.sch td{padding:6px;text-align:center;border-bottom:1px solid #f1f5f9;height:52px;vertical-align:middle;}
.sch td:first-child{text-align:left;padding-left:16px;font-weight:600;color:#0f172a;background:#fff;border-right:1px solid #f1f5f9;}
.sch tbody tr:hover td{background:#f8fafc;}
.sb{display:inline-flex;padding:4px 14px;border-radius:6px;font-size:11px;font-weight:600;cursor:pointer;transition:all .12s;min-width:72px;justify-content:center;}
.sb:hover{filter:brightness(.92);}
.sb-f{background:#d1fae5;color:#065f46;} .sb-m{background:#dbeafe;color:#1d4ed8;} .sb-a{background:#fef3c7;color:#92400e;} .sb-o{background:#f1f5f9;color:#94a3b8;} .sb-l{background:#fee2e2;color:#dc2626;}
.grp-row td{background:#f8fafc !important;font-weight:700;color:#64748b;font-size:11px;letter-spacing:.04em;text-align:center !important;padding:8px !important;}
.legend{display:flex;gap:14px;font-size:11px;color:#64748b;align-items:center;}
.lg-d{width:12px;height:12px;border-radius:4px;flex-shrink:0;}

/* Drawer */
.dov{position:fixed;inset:0;background:rgba(0,0,0,.3);z-index:998;backdrop-filter:blur(2px);}
.dw{position:fixed;right:0;top:0;bottom:0;background:#fff;z-index:999;display:flex;flex-direction:column;box-shadow:-8px 0 30px rgba(0,0,0,.12);animation:si .25s ease-out;}
@keyframes si{from{transform:translateX(100%)}to{transform:translateX(0)}}
.dh{padding:20px 24px;border-bottom:1px solid #f1f5f9;} .dhr{display:flex;align-items:center;justify-content:space-between;}
.dh h3{font-size:17px;font-weight:700;color:#0f172a;}
.dcl{background:#f1f5f9;border:none;border-radius:8px;width:32px;height:32px;display:flex;align-items:center;justify-content:center;}
.db{flex:1;overflow:auto;padding:24px;} .df{padding:16px 24px;border-top:1px solid #f1f5f9;display:flex;justify-content:flex-end;gap:10px;}
.fl{display:block;font-size:12px;font-weight:600;color:#475569;margin-bottom:6px;}
.fi{width:100%;padding:9px 12px;border-radius:8px;border:1px solid #e2e8f0;font-size:13px;color:#1e293b;outline:none;}
.fi:focus{border-color:#93c5fd;box-shadow:0 0 0 3px rgba(37,99,235,.08);}
textarea.fi{resize:vertical;}
.bc{padding:9px 20px;border-radius:8px;border:1px solid #e2e8f0;background:#fff;font-size:13px;font-weight:500;color:#475569;}
.badge{display:inline-flex;align-items:center;padding:2px 10px;border-radius:999px;font-size:11px;font-weight:600;line-height:20px;}

/* Steps */
.steps{display:flex;align-items:center;margin-bottom:24px;}
.sd{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;flex-shrink:0;}
.sd.act{background:#2563eb;color:#fff;} .sd.dn{background:#059669;color:#fff;} .sd.td{background:#f1f5f9;color:#94a3b8;}
.sl{flex:1;height:2px;margin:0 8px;} .sl.dn{background:#059669;} .sl.act{background:#2563eb;} .sl.td{background:#e2e8f0;}
.stt{font-size:15px;font-weight:700;color:#0f172a;margin-bottom:16px;}

/* Selectable cards */
.sc2{padding:12px 16px;border-radius:10px;border:2px solid #e9edf3;cursor:pointer;transition:all .15s;margin-bottom:8px;}
.sc2:hover{border-color:#93c5fd;background:#eff6ff;} .sc2.sel{border-color:#2563eb;background:#eff6ff;}
.sc2 .mn{font-size:13px;font-weight:600;color:#0f172a;} .sc2 .sb2{font-size:11px;color:#94a3b8;margin-top:2px;}

/* Time grid */
.tg{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;}
.tc2{padding:10px;border-radius:8px;border:1px solid #e9edf3;text-align:center;font-size:12px;font-weight:600;color:#334155;cursor:pointer;transition:all .15s;}
.tc2:hover{border-color:#2563eb;color:#2563eb;background:#eff6ff;}
.tc2.sel{background:#2563eb;color:#fff;border-color:#2563eb;}
.tc2.dis{background:#f1f5f9;color:#cbd5e1;cursor:not-allowed;border-color:#f1f5f9;}

.sr2{padding:10px 14px;border-radius:8px;cursor:pointer;transition:background .1s;}
.sr2:hover{background:#f8fafc;} .sr2 .nm{font-size:13px;font-weight:600;color:#0f172a;} .sr2 .ph{font-size:12px;color:#94a3b8;}

/* Cancelled list */
.cx-list{margin-top:16px;padding:14px 16px;border-radius:10px;background:#f8fafc;border:1px solid #e9edf3;}
.cx-title{font-size:12px;font-weight:600;color:#94a3b8;margin-bottom:8px;}
.cx-row{display:flex;align-items:center;justify-content:space-between;padding:7px 0;border-bottom:1px solid #f1f5f9;font-size:12px;}
.cx-row:last-child{border-bottom:none;}

/* Config panel */
.cfg{background:#fff;border-radius:14px;border:1px solid #e9edf3;padding:18px 22px;margin-bottom:20px;}
.cfg-title{font-size:13px;font-weight:700;color:#0f172a;margin-bottom:14px;}
.cfg-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;}
.cfg-sub{font-size:11px;color:#94a3b8;margin-bottom:4px;}
</style>
</head>

function buildResourceView(today){
  let cols='';
  STAFF.forEach(s=>{
    const appts=today.filter(a=>a.sid===s.id&&a.status!=='cancelled');
    let slots=HRS.map(()=>'<div class="sr"></div>').join('');
    let blocks=appts.map(a=>{
      const i=idx(a.time);if(i<0)return '';
      const top=i*60,h=a.dur*30-3;
      const cls=a.type==='med'?'med':a.type==='vac'?'vac':'grm';
      const scls=a.status==='pending'?'sp':a.status==='checked'?'sc':'ss';
      const shtml=a.status==='pending'?'':a.status==='checked'?'✓':'⚡';
      return `<div class="ab ${cls}" style="top:${top}px;height:${h}px" onclick="openSt(${a.id})">
        <div class="ab-s ${scls}">${shtml}</div>
        <div class="ab-n">${a.cust}</div>
        <div class="ab-p">${a.pet} · ${a.svc}</div>
        <div class="tt">
          <div class="ttr"><span class="ttl">客户</span><span class="ttv">${a.cust}</span></div>
          <div class="ttr"><span class="ttl">宠物</span><span class="ttv">${a.pet}</span></div>
          <div class="ttr"><span class="ttl">服务</span><span class="ttv">${a.svc}</span></div>
          <div class="ttr"><span class="ttl">时间</span><span class="ttv">${a.time} (${a.dur*30}min)</span></div>
          <div class="ttr"><span class="ttl">电话</span><span class="ttv">${a.phone}</span></div>
          ${a.note?`<div class="ttr"><span class="ttl">备注</span><span class="ttv" style="color:#dc2626">${a.note}</span></div>`:''}
          <div class="tta">
            <button class="ttb ttb-g" onclick="event.stopPropagation();doCheckin(${a.id})">签到</button>
            <button class="ttb ttb-b" onclick="event.stopPropagation()">改签</button>
            <button class="ttb ttb-r" onclick="event.stopPropagation();doCancel(${a.id})">取消</button>
          </div>
        </div>
      </div>`;
    }).join('');
    cols+=`<div class="rc"><div class="rh"><span style="font-size:15px">${s.emoji}</span><div><div class="rn">${s.name}</div><div class="rr">${s.role}</div></div></div><div class="rb">${slots}${blocks}</div></div>`;
  });
  return `<div class="rv-wrap"><div class="rv-scroll"><div class="rv"><div class="tc"><div style="height:44px;border-bottom:1px solid #e9edf3"></div>${HRS.map(h=>`<div class="ts">${h}</div>`).join('')}</div>${cols}</div></div></div>`;
}

function buildWeekView(){
  // Group appointments by day
  let headerCells=WK.map((d,i)=>{
    const isToday=i===1;
    return `<th style="${isToday?'background:#eff6ff;color:#2563eb':''}">${d}${isToday?' <span style="font-size:9px;background:#2563eb;color:#fff;padding:1px 6px;border-radius:99px;margin-left:4px">今天</span>':''}</th>`;
  }).join('');

  // Build rows per time block (morning/afternoon)
  const periods=[{label:'上午',hours:['09:00','09:30','10:00','10:30','11:00','11:30']},{label:'下午',hours:['12:00','12:30','13:00','13:30','14:00','14:30','15:00','15:30','16:00','16:30','17:00','17:30']}];

  let rows='';
  periods.forEach(p=>{
    let cells=WK.map((_,dayIdx)=>{
      const dayNum=dayIdx;
      const dayAppts=APPTS.filter(a=>a.day===dayNum&&p.hours.includes(a.time));
      if(!dayAppts.length) return `<td><div class="wv-count">无预约</div></td>`;
      return `<td>${dayAppts.map(a=>{
        const cls=a.type==='med'?'med':a.type==='vac'?'vac':'grm';
        const staff=STAFF.find(st=>st.id===a.sid);
        return `<div class="wv-appt ${cls}" onclick="openSt(${a.id})" title="${a.cust} ${a.pet} ${a.svc}">${a.time} ${a.cust} · ${staff?staff.name:''}</div>`;
      }).join('')}</td>`;
    }).join('');
    rows+=`<tr><td>${p.label}</td>${cells}</tr>`;
  });

  // Summary row
  let sumCells=WK.map((_,dayIdx)=>{
    const cnt=APPTS.filter(a=>a.day===dayIdx).length;
    const pct=Math.min(cnt/5*100,100);
    const color=pct>80?'#dc2626':pct>50?'#d97706':'#059669';
    return `<td style="vertical-align:middle"><div style="font-size:12px;font-weight:700;color:#0f172a;margin-bottom:4px">${cnt} 预约</div><div style="height:4px;border-radius:2px;background:#f1f5f9"><div style="height:100%;border-radius:2px;background:${color};width:${pct}%"></div></div><div style="font-size:10px;color:#94a3b8;margin-top:2px">饱和度 ${Math.round(pct)}%</div></td>`;
  }).join('');

  return `<div class="wv"><table><thead><tr><th>时段</th>${headerCells}</tr></thead><tbody>${rows}<tr style="background:#f8fafc"><td style="font-weight:700;color:#64748b">汇总</td>${sumCells}</tr></tbody></table></div>`;
}

function openShift(sid,day){

  document.getElementById('sh-title').textContent=`修改班次 - ${staff.name} ${WK[day]}`;
  const opts=[{k:'full',l:'全天班 (09:00-21:00)',c:'sb-f'},{k:'morning',l:'早班 (09:00-18:00)',c:'sb-m'},{k:'afternoon',l:'晚班 (12:00-21:00)',c:'sb-a'},{k:'off',l:'休息',c:'sb-o'},{k:'leave',l:'请假',c:'sb-l'}];

function selectShift(k,el){document.querySelectorAll('#sh-body .sc2').forEach(e=>e.classList.remove('sel'));el.classList.add('sel');S.shNewVal=k;}

  const SBG={pending:'#f1f5f9',checked:'#d1fae5',serving:'#dbeafe',cancelled:'#fee2e2'};
  const STC={pending:'#475569',checked:'#065f46',serving:'#1d4ed8',cancelled:'#991b1b'};
  const staff=STAFF.find(s=>s.id===a.sid);

  let acts='';
  if(a.status==='pending') acts=`<div style="display:flex;gap:8px;margin-top:16px"><button class="btn-primary" style="flex:1;background:#059669;justify-content:center" onclick="doCheckin(${a.id});closeSt()">✓ 到店签到</button><button class="btn-primary" style="flex:1;background:#334155;justify-content:center">改签时间</button><button class="btn-primary" style="flex:1;background:#dc2626;justify-content:center" onclick="doCancel(${a.id});closeSt()">取消预约</button></div>`;
  else if(a.status==='checked') acts=`<div style="display:flex;gap:8px;margin-top:16px"><button class="btn-primary" style="flex:1;background:#2563eb;justify-content:center" onclick="doServe(${a.id});closeSt()">⚡ 开始服务</button></div><div style="margin-top:10px;padding:10px 14px;border-radius:8px;background:#ecfdf5;font-size:12px;color:#065f46">✓ 已签到 · 排队号已生成 · 等待叫号中</div>`;
  else if(a.status==='serving') acts=`<div style="margin-top:16px;padding:12px;border-radius:8px;background:#dbeafe;font-size:13px;color:#1d4ed8;text-align:center;font-weight:600">⚡ 服务进行中...</div>`;
  else acts=`<div style="margin-top:16px;padding:12px;border-radius:8px;background:#fee2e2;font-size:13px;color:#991b1b;text-align:center;font-weight:600">已取消</div>`;

  document.getElementById('st-body').innerHTML=`
    <div style="text-align:center;margin-bottom:20px"><span class="badge" style="background:${SBG[a.status]};color:${STC[a.status]};padding:6px 16px;font-size:13px">${SL2[a.status]}</span></div>
    <div style="background:#f8fafc;border-radius:10px;padding:16px;margin-bottom:16px">
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;font-size:13px">
        <div><div style="font-size:11px;color:#94a3b8;margin-bottom:2px">客户</div><div style="font-weight:600">${a.cust}</div></div>
        <div><div style="font-size:11px;color:#94a3b8;margin-bottom:2px">电话</div><div style="font-weight:600">${a.phone}</div></div>
        <div><div style="font-size:11px;color:#94a3b8;margin-bottom:2px">宠物</div><div style="font-weight:600">${a.pet}</div></div>
        <div><div style="font-size:11px;color:#94a3b8;margin-bottom:2px">服务</div><div style="font-weight:600">${a.svc}</div></div>
        <div><div style="font-size:11px;color:#94a3b8;margin-bottom:2px">时间</div><div style="font-weight:600">${a.time} (${a.dur*30}分钟)</div></div>
        <div><div style="font-size:11px;color:#94a3b8;margin-bottom:2px">服务人员</div><div style="font-weight:600">${staff?staff.name:''}</div></div>
      </div>
    </div>
    ${a.note?`<div style="padding:10px 14px;border-radius:8px;background:#fef3c7;font-size:12px;color:#92400e;margin-bottom:12px">📝 ${a.note}</div>`:''}
    ${a.status==='pending'?`<div><div class="fl">取消原因</div><select class="fi"><option>请选择...</option><option>客户改期</option><option>突发情况</option><option>客户爽约</option></select></div>`:''}
    ${acts}
  `;
  document.getElementById('st-ov').style.display='block';
  document.getElementById('st-dw').style.display='flex';
}
function closeSt(){document.getElementById('st-ov').style.display='none';document.getElementById('st-dw').style.display='none';}

function doCheckin(id){const a=APPTS.find(x=>x.id===id);if(a)a.status='checked';renderDash();}
function doCancel(id){const a=APPTS.find(x=>x.id===id);if(a){a.status='cancelled';a.note=a.note||'前台取消';}renderDash();}
function doServe(id){const a=APPTS.find(x=>x.id===id);if(a)a.status='serving';renderDash();}

// ═══════ MODULE SWITCH ═══════
function switchMod(m){
  S.mod=m;
  document.querySelectorAll('.mod-tab').forEach((e,i)=>e.classList.toggle('active',i===(m==='dash'?0:1)));
  document.getElementById('pg-dash').style.display=m==='dash'?'block':'none';
  document.getElementById('pg-sched').style.display=m==='sched'?'block':'none';
  if(m==='dash')renderDash();else renderSched();
}

renderDash();renderSched();
</script>
</body>
</html>
